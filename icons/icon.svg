<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)" stroke="#4a5568" stroke-width="2"/>
  
  <!-- Wall/Brick pattern -->
  <rect x="40" y="40" width="48" height="48" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <rect x="44" y="44" width="20" height="20" fill="white" opacity="0.8"/>
  <rect x="64" y="44" width="20" height="20" fill="white" opacity="0.8"/>
  <rect x="44" y="64" width="20" height="20" fill="white" opacity="0.8"/>
  <rect x="64" y="64" width="20" height="20" fill="white" opacity="0.8"/>
  
  <!-- Focus dot in center -->
  <circle cx="64" cy="64" r="6" fill="#667eea" opacity="0.9"/>
</svg>
